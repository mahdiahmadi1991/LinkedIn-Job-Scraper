#:schema https://developers.openai.com/codex/config-schema.json

# keep the global Codex config lightweight and enable the heavier
# long-thread settings only for this repository.

profile = "long_threads"

# GPT-5.4 in Codex supports experimental 1M context.
# Standard window is 272K; above that usage is billed at 2x.
# model_context_window = 1050000
# model_auto_compact_token_limit = 900000

[features]
runtime_metrics = true

[profiles.long_threads]
# Default profile for this workspace: best for long-running threads
# with heavy context and up-to-date checks.
model_reasoning_effort = "high"
web_search = "live"

[profiles.fast_ops]
# Faster/lighter profile for routine edits and lower-noise operation.
model_reasoning_effort = "medium"
web_search = "disabled"

[profiles.safe_mode]
# Conservative profile when you want tighter execution controls.
model_reasoning_effort = "high"
web_search = "disabled"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
