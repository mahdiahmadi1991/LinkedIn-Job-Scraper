name: Main Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LinkedIn.JobScraper.sln

      - name: Format Check
        run: dotnet format LinkedIn.JobScraper.sln --verify-no-changes --no-restore

      - name: Build (Warnings as Errors)
        run: dotnet build LinkedIn.JobScraper.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: >
          dotnet test LinkedIn.JobScraper.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./artifacts/test-results
          --collect:"XPlat Code Coverage"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: error

  versioning:
    needs:
      - build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Version Artifacts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/versioning-guard.sh validate

      - name: Create Version Tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(bash scripts/versioning-guard.sh current)"
          git fetch --tags --force

          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release (Auto Notes)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(bash scripts/versioning-guard.sh current)"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists. Skipping."
            exit 0
          fi

          gh release create "$VERSION" --title "$VERSION" --generate-notes

  deploy:
    needs:
      - build-test
      - versioning
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/mahdiahmadi1991/linkedin-job-scraper-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.DEPLOY_SSH_PORT }}' -H '${{ secrets.DEPLOY_HOST }}' >> ~/.ssh/known_hosts

      - name: Create Remote Directories
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p '${{ secrets.DEPLOY_SSH_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' \
            "sudo install -d -m 755 '${{ secrets.DEPLOY_APP_DIR }}' '${{ secrets.DEPLOY_APP_DIR }}/nginx' '${{ secrets.DEPLOY_APP_DIR }}/logs' '${{ secrets.DEPLOY_APP_DIR }}/data-protection-keys' && \
             sudo chown -R \$(id -u -n):\$(id -g -n) '${{ secrets.DEPLOY_APP_DIR }}'"

      - name: Upload Deploy Assets
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_ed25519 -P '${{ secrets.DEPLOY_SSH_PORT }}' \
            deploy/production/docker-compose.yml \
            deploy/production/remote-deploy.sh \
            '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_APP_DIR }}/'
          scp -i ~/.ssh/id_ed25519 -P '${{ secrets.DEPLOY_SSH_PORT }}' \
            deploy/production/nginx/app-http.conf.template \
            deploy/production/nginx/app-https.conf.template \
            '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_APP_DIR }}/nginx/'

      - name: Write Runtime Configuration
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p '${{ secrets.DEPLOY_SSH_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' \
            "cat > '${{ secrets.DEPLOY_APP_DIR }}/.env.runtime'" <<'EOF'
          SqlServer__ConnectionString=${{ secrets.SQLSERVER__CONNECTIONSTRING }}
          EOF

      - name: Run Remote Deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p '${{ secrets.DEPLOY_SSH_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' \
            "chmod 700 '${{ secrets.DEPLOY_APP_DIR }}/remote-deploy.sh' && \
             DEPLOY_APP_DIR='${{ secrets.DEPLOY_APP_DIR }}' \
             DEPLOY_DOMAIN='${{ secrets.DEPLOY_DOMAIN }}' \
             GHCR_USERNAME='${{ github.actor }}' \
             GHCR_TOKEN='${{ github.token }}' \
             IMAGE_REF='${{ env.IMAGE_NAME }}:${{ github.sha }}' \
             '${{ secrets.DEPLOY_APP_DIR }}/remote-deploy.sh'"
