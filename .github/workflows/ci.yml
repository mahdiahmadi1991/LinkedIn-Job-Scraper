name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LinkedIn.JobScraper.sln

      - name: Format Check
        run: dotnet format LinkedIn.JobScraper.sln --verify-no-changes --no-restore

      - name: Build (Warnings as Errors)
        run: dotnet build LinkedIn.JobScraper.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test LinkedIn.JobScraper.sln --configuration Release --no-build

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
