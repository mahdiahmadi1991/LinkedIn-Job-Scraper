name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LinkedIn.JobScraper.sln

      - name: Build
        run: dotnet build LinkedIn.JobScraper.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test LinkedIn.JobScraper.sln --configuration Release --no-build
