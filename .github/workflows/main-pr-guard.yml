name: Main PR Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted

concurrency:
  group: main-pr-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  versioning-pr-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure VERSION and CHANGELOG are changed in PR
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          if ! grep -qx "VERSION" <<<"$CHANGED_FILES"; then
            echo "PR to main must include VERSION update."
            exit 1
          fi

          if ! grep -qx "CHANGELOG.md" <<<"$CHANGED_FILES"; then
            echo "PR to main must include CHANGELOG.md update."
            exit 1
          fi

      - name: Validate Version Artifacts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/versioning-guard.sh validate

  copilot-review-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Ensure Copilot approved current PR head
        uses: actions/github-script@v8
        env:
          COPILOT_REVIEW_TIMEOUT_SECONDS: "900"
          COPILOT_REVIEW_POLL_SECONDS: "20"
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = pullRequest.number;
            const headSha = pullRequest.head.sha;
            const timeoutSeconds = Number(process.env.COPILOT_REVIEW_TIMEOUT_SECONDS ?? "900");
            const pollSeconds = Number(process.env.COPILOT_REVIEW_POLL_SECONDS ?? "20");
            const deadline = Date.now() + timeoutSeconds * 1000;
            const isCopilotLogin = (login) => {
              if (!login) return false;
              const normalized = login.toLowerCase();
              return normalized.includes("copilot");
            };

            while (true) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100
              });

              const copilotReviews = reviews.filter((review) => isCopilotLogin(review.user?.login));
              const copilotReviewsOnCurrentHead = copilotReviews.filter(
                (review) => review.commit_id === headSha
              );

              const latestCopilotReviewByReviewer = new Map();
              for (const review of copilotReviewsOnCurrentHead) {
                const login = review.user?.login?.toLowerCase() ?? "copilot";
                const current = latestCopilotReviewByReviewer.get(login);
                const reviewId = Number(review.id ?? 0);
                const currentId = Number(current?.id ?? 0);
                if (!current || reviewId >= currentId) {
                  latestCopilotReviewByReviewer.set(login, review);
                }
              }

              const latestCopilotReviewsOnCurrentHead = Array.from(
                latestCopilotReviewByReviewer.values()
              );
              if (latestCopilotReviewsOnCurrentHead.length > 0) {
                const blockingStates = new Set(["CHANGES_REQUESTED"]);
                const blockingReview = latestCopilotReviewsOnCurrentHead.find((review) =>
                  blockingStates.has((review.state ?? "").toUpperCase())
                );
                if (blockingReview) {
                  core.setFailed(
                    `Copilot requested changes on the latest head commit (${headSha}). Resolve and push a fix commit.`
                  );
                  return;
                }

                const approvalStates = new Set(["APPROVED"]);
                const approvalReview = latestCopilotReviewsOnCurrentHead.find((review) =>
                  approvalStates.has((review.state ?? "").toUpperCase())
                );
                if (approvalReview) {
                  core.info(`Copilot approval gate passed on head ${headSha}.`);
                  return;
                }

                const seenStates = Array.from(
                  new Set(
                    latestCopilotReviewsOnCurrentHead.map((review) =>
                      String(review.state ?? "UNKNOWN").toUpperCase()
                    )
                  )
                ).join(", ");
                core.setFailed(
                  `Copilot reviewed latest PR head commit (${headSha}) with state(s): ${seenStates}. Approval is required before merge.`
                );
                return;
              }

              if (Date.now() >= deadline) {
                const message = copilotReviews.length === 0
                  ? "Copilot approval is required before merging to main."
                  : `Copilot has not reviewed the latest PR head commit (${headSha}).`;
                core.setFailed(message);
                return;
              }

              core.info(
                `Copilot review for head ${headSha} is not available yet. Retrying in ${pollSeconds}s...`
              );
              await new Promise((resolve) => setTimeout(resolve, pollSeconds * 1000));
            }

  enable-auto-merge:
    needs:
      - versioning-pr-guard
      - copilot-review-gate
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      (
        github.event.pull_request.head.ref == 'develop' ||
        startsWith(github.event.pull_request.head.ref, 'hotfix/')
      ) &&
      github.event.pull_request.draft == false &&
      needs.versioning-pr-guard.result == 'success' &&
      needs.copilot-review-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge (merge commit)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER='${{ github.event.pull_request.number }}'
          gh pr merge "$PR_NUMBER" --repo '${{ github.repository }}' --auto --merge
