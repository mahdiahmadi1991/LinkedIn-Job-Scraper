name: Project Task Ops

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
      - unlabeled
      - closed
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
      - closed
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: false
        type: choice
        default: event
        options:
          - event
          - backfill

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  sync-project-task-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync Issue/PR To Project
        uses: actions/github-script@v7
        env:
          PROJECT_OWNER: mahdiahmadi1991
          PROJECT_NUMBER: "1"
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN || github.token }}
          script: |
            const runProjectTaskOps = require("./scripts/github/project-task-ops.cjs");
            await runProjectTaskOps({ github, context, core });
