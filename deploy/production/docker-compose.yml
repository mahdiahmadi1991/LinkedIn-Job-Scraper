services:
  web:
    image: ${IMAGE_REF:-ghcr.io/mahdiahmadi1991/linkedin-job-scraper-web:main}
    container_name: linkedin-job-scraper-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.runtime
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:5180
      DataProtection__KeysDirectory: /app/data-protection-keys
      DOTNET_RUNNING_IN_CONTAINER: "true"
    volumes:
      - ./data-protection-keys:/app/data-protection-keys
      - ./app-data:/app/App_Data
      - ./logs:/app/logs
